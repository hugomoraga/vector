name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "nonprod"
        type: choice
        options:
          - nonprod
          - prod

env:
  ENVIRONMENT: ${{ github.event.inputs.environment || 'nonprod' }}
  REGION: us-central1
  AR_REPO: vector

permissions:
  contents: read
  id-token: write # Required for WIF

jobs:
  # ── Set dynamic variables ────────────────────
  config:
    name: Configure
    runs-on: ubuntu-latest
    outputs:
      project_id: ${{ steps.vars.outputs.project_id }}
      api_image: ${{ steps.vars.outputs.api_image }}
      web_image: ${{ steps.vars.outputs.web_image }}
      environment: ${{ steps.vars.outputs.environment }}
    steps:
      - name: Set environment variables
        id: vars
        run: |
          ENV="${{ github.event.inputs.environment || 'nonprod' }}"
          PROJECT_ID="vector-app-${ENV}"
          echo "project_id=${PROJECT_ID}" >> "$GITHUB_OUTPUT"
          echo "api_image=${{ env.REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.AR_REPO }}/api" >> "$GITHUB_OUTPUT"
          echo "web_image=${{ env.REGION }}-docker.pkg.dev/${PROJECT_ID}/${{ env.AR_REPO }}/web" >> "$GITHUB_OUTPUT"
          echo "environment=${ENV}" >> "$GITHUB_OUTPUT"

  # ── Which apps changed (push) or all (manual) ─
  changes:
    name: Path filter
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.decide.outputs.api }}
      web: ${{ steps.decide.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name == 'push'
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'
              - 'turbo.json'
              - 'tsconfig.base.json'
              - 'apps/api/Dockerfile'
              - '.github/workflows/deploy.yml'
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'package.json'
              - 'package-lock.json'
              - 'turbo.json'
              - 'tsconfig.base.json'
              - 'apps/web/Dockerfile'
              - '.github/workflows/deploy.yml'

      - name: Decide deploy targets
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "api=true" >> "$GITHUB_OUTPUT"
            echo "web=true" >> "$GITHUB_OUTPUT"
            echo "reason=workflow_dispatch" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "api=${{ steps.filter.outputs.api }}" >> "$GITHUB_OUTPUT"
          echo "web=${{ steps.filter.outputs.web }}" >> "$GITHUB_OUTPUT"
          echo "reason=path_filter" >> "$GITHUB_OUTPUT"

      - name: Summary
        run: |
          echo "Deploy API: ${{ steps.decide.outputs.api }}"
          echo "Deploy Web: ${{ steps.decide.outputs.web }}"

  # ── Build + Push Docker images ───────────────
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    needs: [config, changes]
    if: needs.changes.outputs.api == 'true' || needs.changes.outputs.web == 'true'
    outputs:
      app_version: ${{ steps.meta.outputs.app_version }}
      api_tag: ${{ steps.meta.outputs.api_tag }}
      web_tag: ${{ steps.meta.outputs.web_tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GH_ACTIONS_SA }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.REGION }}-docker.pkg.dev --quiet

      - name: Generate image tags (package.json version + git short SHA)
        id: meta
        run: |
          VERSION="$(node -p "require('./package.json').version")"
          SHA="${{ github.sha }}"
          SHORT="${SHA:0:7}"
          SUFFIX="${VERSION}-${SHORT}"
          echo "app_version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "api_tag=${{ needs.config.outputs.api_image }}:${SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "web_tag=${{ needs.config.outputs.web_image }}:${SUFFIX}" >> "$GITHUB_OUTPUT"
          echo "Publishing tags: ${SUFFIX}, ${VERSION}, latest"

      - name: Build & Push API
        if: needs.changes.outputs.api == 'true'
        env:
          VERSION: ${{ steps.meta.outputs.app_version }}
        run: |
          docker build \
            -f apps/api/Dockerfile \
            -t ${{ steps.meta.outputs.api_tag }} \
            -t ${{ needs.config.outputs.api_image }}:${VERSION} \
            -t ${{ needs.config.outputs.api_image }}:latest \
            .
          docker push ${{ steps.meta.outputs.api_tag }}
          docker push ${{ needs.config.outputs.api_image }}:${VERSION}
          docker push ${{ needs.config.outputs.api_image }}:latest

      - name: Build & Push Web
        if: needs.changes.outputs.web == 'true'
        env:
          VERSION: ${{ steps.meta.outputs.app_version }}
        run: |
          docker build \
            -f apps/web/Dockerfile \
            --build-arg NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }} \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY=${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }} \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }} \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID=${{ needs.config.outputs.project_id }} \
            --build-arg NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }} \
            --build-arg NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }} \
            --build-arg NEXT_PUBLIC_FIREBASE_APP_ID=${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID }} \
            -t ${{ steps.meta.outputs.web_tag }} \
            -t ${{ needs.config.outputs.web_image }}:${VERSION} \
            -t ${{ needs.config.outputs.web_image }}:latest \
            .
          docker push ${{ steps.meta.outputs.web_tag }}
          docker push ${{ needs.config.outputs.web_image }}:${VERSION}
          docker push ${{ needs.config.outputs.web_image }}:latest

  # ── Deploy to Cloud Run ──────────────────────
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [config, build, changes]
    steps:
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.GH_ACTIONS_SA }}

      - name: Deploy API to Cloud Run
        if: needs.changes.outputs.api == 'true'
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: vector-api
          image: ${{ needs.build.outputs.api_tag }}
          region: ${{ env.REGION }}
          project_id: ${{ needs.config.outputs.project_id }}

      - name: Deploy Web to Cloud Run
        if: needs.changes.outputs.web == 'true'
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: vector-web
          image: ${{ needs.build.outputs.web_tag }}
          region: ${{ env.REGION }}
          project_id: ${{ needs.config.outputs.project_id }}

      - name: Show URLs
        run: |
          echo "App version (package.json): ${{ needs.build.outputs.app_version }}"
          if [ "${{ needs.changes.outputs.api }}" = "true" ]; then
            echo "API image: ${{ needs.build.outputs.api_tag }}"
            echo "API: $(gcloud run services describe vector-api --project=${{ needs.config.outputs.project_id }} --region=${{ env.REGION }} --format='value(status.url)')"
          fi
          if [ "${{ needs.changes.outputs.web }}" = "true" ]; then
            echo "Web image: ${{ needs.build.outputs.web_tag }}"
            echo "Web: $(gcloud run services describe vector-web --project=${{ needs.config.outputs.project_id }} --region=${{ env.REGION }} --format='value(status.url)')"
          fi
